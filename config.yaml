bot:
  name: LocalBiz Assistant
  icon: 🤖
  greeting: Hi! 👋 How can I help you today?
  system_prompt: You are a friendly assistant for LocalBiz. Help customers with opening
    hours, services, pricing, and bookings. Be concise and warm. If unsure, ask the
    customer to call us directly.
  quick_replies:
  - Opening hours
  - Book appointment
  - Pricing
  - Location
theme:
  primary_color: '#1a1a2e'
  accent_color: '#e94560'
models:
  providers:
  - name: mistral
    env_key: MISTRAL_API_KEY
    endpoint: https://api.mistral.ai/v1/chat/completions
    model: mistral-small-latest
    auth_header: Bearer
  - name: github
    env_key: GIT_TOKEN
    endpoint: https://models.github.ai/inference/chat/completions
    model: gpt-4o
    auth_header: Bearer
deploy:
  output_dir: docs
