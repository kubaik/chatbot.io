name: AI Chatbot — Build & Deploy

# ── Same trigger pattern as your blog workflow ──────────────────
on:
  schedule:
    - cron: "0 * * * *" # hourly (keeps Pages fresh; remove if not needed)
  workflow_dispatch: # manual trigger from Actions UI
    inputs:
      force_rebuild:
        description: "Force full rebuild even if no changes"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

# ── Prevents stacked runs colliding on git push (same fix as blog) ──
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python setup (mirrors blog workflow exactly) ──────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Pull latest (same robust fetch+reset pattern) ─────────
      - name: Pull latest changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git fetch origin main
          git reset --hard origin/main

      # ── 4. Verify secrets (same pattern as blog verify step) ─────
      #  Logs OK/WARNING for every possible provider key.
      #  chatbot_system.py verify picks the first available one.
      - name: Verify secrets
        run: |
          for VAR in GIT_TOKEN \
                     GROQ_API_KEY \
                     GEMINI_API_KEY \
                     OPENROUTER_API_KEY \
                     CEREBRAS_API_KEY \
                     MISTRAL_API_KEY \
                     NVIDIA_API_KEY; do
            if [ -z "${!VAR}" ]; then
              echo "WARNING: $VAR is not set"
            else
              echo "OK: $VAR is set"
            fi
          done
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

      # ── 5. Init config if missing ────────────────────────────────
      - name: Initialize config if needed
        run: |
          [ -f "config.yaml" ] && echo "config.yaml exists" \
            || python chatbot_system.py init

      # ── 6. Build static site ─────────────────────────────────────
      #  Python reads config.yaml + env secrets → writes docs/
      #  Token is injected into chat.js here — never touches source.
      - name: Build chatbot
        env:
          # All providers passed in — Python picks the first available
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python chatbot_system.py auto || {
            echo "WARNING: auto failed — falling back to build"
            python chatbot_system.py build
          }

      # ── 7. Verify output (mirrors blog verify step) ──────────────
      - name: Verify generated content
        run: |
          [ -f "docs/index.html" ]            || { echo "ERROR: no index.html";   exit 1; }
          [ -f "docs/static/js/chat.js" ]     || { echo "ERROR: no chat.js";      exit 1; }
          [ -f "docs/static/css/chat.css" ]   || { echo "ERROR: no chat.css";     exit 1; }
          echo "✅ All output files present"
          echo "index.html:  $(wc -c < docs/index.html) bytes"
          echo "chat.js:     $(wc -c < docs/static/js/chat.js) bytes"
          echo "chat.css:    $(wc -c < docs/static/css/chat.css) bytes"

      # ── 8. Commit built docs back to repo ────────────────────────
      #  Same retry-on-collision pattern as blog workflow.
      - name: Commit and push with retry
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Auto-build chatbot $(date '+%Y-%m-%d %H:%M UTC')"
            git push origin main || {
              echo "Push failed — pulling and retrying..."
              git fetch origin main
              git rebase origin/main
              git push origin main
            }
          fi

      # ── 9. Deploy to GitHub Pages ─────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 10. Summary (same format as blog workflow) ────────────────
      - name: Summary
        run: |
          {
            echo "## Chatbot Deployed ✅"
            echo "**URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "**Trigger**: ${{ github.event_name }}"
            echo "**Run**: #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Files"
            echo "| File | Size |"
            echo "|---|---|"
            echo "| index.html | $(wc -c < docs/index.html) bytes |"
            echo "| chat.js | $(wc -c < docs/static/js/chat.js) bytes |"
            echo "| chat.css | $(wc -c < docs/static/css/chat.css) bytes |"
            echo ""
            echo "### Provider"
            python -c "
          import json, pathlib
          cfg = json.loads(pathlib.Path('docs/config.json').read_text())
          p = cfg.get('provider', {})
          print(f\"| Name | {p.get('name','?')} |\")
          print(f\"| Model | {p.get('model','?')} |\")
            "
          } >> $GITHUB_STEP_SUMMARY
