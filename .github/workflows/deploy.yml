name: Java Restaurant Chatbot — Build & Deploy

on:
  schedule:
    - cron: "0 6 * * *" # daily 6 AM rebuild keeps Pages fresh
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force full rebuild"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read # read-only — _site/ is never committed back to git
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Verify secrets ────────────────────────────────────────
      # GIT_TOKEN  = GitHub Models (primary, uses gpt-4o)
      # MISTRAL_API_KEY = Mistral AI (fallback)
      - name: Verify secrets
        run: |
          for VAR in GIT_TOKEN MISTRAL_API_KEY; do
            if [ -z "${!VAR}" ]; then
              echo "WARNING: $VAR is not set"
            else
              echo "OK: $VAR is set"
            fi
          done
          if [ -z "$GIT_TOKEN" ] && [ -z "$MISTRAL_API_KEY" ]; then
            echo "WARNING: No API keys set — chatbot will run in demo mode"
          fi
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      # ── 4. Init config if missing ────────────────────────────────
      - name: Initialize config if needed
        run: |
          [ -f "config.yaml" ] && echo "config.yaml exists" \
            || python chatbot_system.py init

      # ── 5. Build ─────────────────────────────────────────────────
      # BUILD_OUTPUT_DIR=_site avoids the gitignore/upload-pages-artifact
      # conflict — _site/ is built fresh on the runner and never committed.
      - name: Build chatbot
        env:
          BUILD_OUTPUT_DIR: _site
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python chatbot_system.py auto || {
            echo "WARNING: auto failed — falling back to build only"
            python chatbot_system.py build
          }

      # ── 6. Verify output ─────────────────────────────────────────
      - name: Verify generated content
        run: |
          [ -f "_site/index.html" ]          || { echo "ERROR: no index.html"; exit 1; }
          [ -f "_site/static/js/chat.js" ]   || { echo "ERROR: no chat.js";    exit 1; }
          [ -f "_site/static/css/chat.css" ] || { echo "ERROR: no chat.css";   exit 1; }
          echo "✅ All output files present"
          echo "index.html : $(wc -c < _site/index.html) bytes"
          echo "chat.js    : $(wc -c < _site/static/js/chat.js) bytes"
          echo "chat.css   : $(wc -c < _site/static/css/chat.css) bytes"

      # ── 7. Deploy ────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 8. Summary ───────────────────────────────────────────────
      - name: Summary
        run: |
          {
            echo "## Java Restaurant Chatbot Deployed ☕"
            echo "**URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "**Trigger**: ${{ github.event_name }}"
            echo "**Run**: #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Build output"
            echo "| File | Size |"
            echo "|---|---|"
            echo "| index.html | $(wc -c < _site/index.html) bytes |"
            echo "| chat.js    | $(wc -c < _site/static/js/chat.js) bytes |"
            echo "| chat.css   | $(wc -c < _site/static/css/chat.css) bytes |"
            echo ""
            echo "### Active provider"
            python -c "
          import json, pathlib
          cfg = json.loads(pathlib.Path('_site/config.json').read_text())
          p = cfg.get('provider', {})
          print(f\"| Name  | {p.get('name','?')} |\")
          print(f\"| Model | {p.get('model','?')} |\")
            "
          } >> $GITHUB_STEP_SUMMARY
